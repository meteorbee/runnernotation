<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunnerNotation Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #0f0f1a;
    --surface2: #141420;
    --border: #1e1e35;
    --border-bright: #2a2a50;
    --text: #d0cfe8;
    --muted: #5a5880;
    --accent: #ff003c;
    --accent2: #00f0ff;
    --perfect: #00ff88;
    --perfect-dim: #00aa55;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .page { max-width: 860px; margin: 0 auto; }

  header { margin-bottom: 2.5rem; position: relative; }
  header::after { content: ''; display: block; height: 1px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 60%, transparent 100%); margin-top: 1rem; }
  header h1 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  header p { font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: 0.05em; text-transform: uppercase; }
  header p span { color: var(--accent); text-shadow: 0 0 20px rgba(255,0,60,0.5); }

  .locked-banner { display: flex; align-items: center; gap: 8px; background: rgba(255,160,0,0.08); border: 1px solid rgba(255,160,0,0.3); border-radius: 4px; padding: 9px 14px; margin-bottom: 1rem; font-size: 13px; color: #ffa500; font-family: var(--mono); }

  .layout { display: grid; grid-template-columns: 210px 1fr; gap: 1.5rem; align-items: start; }
  @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--accent2) 0%, transparent 70%); opacity: 0.5; }
  .card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent2); margin-bottom: 14px; }

  .move-btn-wrap { position: relative; margin-bottom: 4px; }

  .move-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 3px; background: transparent; font-family: var(--mono); font-size: 12px; color: var(--text); cursor: pointer; transition: all 0.1s; text-align: left; letter-spacing: 0.06em; }
  .move-btn:hover { background: var(--surface2); border-color: var(--border-bright); color: var(--accent2); }
  .move-btn .index { font-size: 10px; color: var(--muted); width: 14px; flex-shrink: 0; }
  .move-btn:hover .index { color: var(--accent); }
  .move-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .move-btn.is-perfect { border-color: var(--perfect-dim); color: var(--perfect); background: rgba(0,255,136,0.05); }
  .move-btn.is-perfect .index { color: var(--perfect); }
  .move-btn.is-perfect:hover { background: rgba(0,255,136,0.08); border-color: var(--perfect); }

  .perfect-hint { font-size: 11px; color: var(--muted); margin-top: 10px; font-style: italic; font-family: var(--mono); }

  .right-col { display: flex; flex-direction: column; gap: 1rem; }

  .sequence-area { min-height: 52px; display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
  .empty-hint { font-size: 12px; color: var(--muted); padding-top: 2px; font-family: var(--mono); }

  .seq-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px 4px 8px; background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 2px; font-size: 11px; color: var(--text); animation: popIn 0.15s ease; font-family: var(--mono); letter-spacing: 0.05em; }
  .seq-tag.is-perfect { border-color: var(--perfect-dim); color: var(--perfect); background: rgba(0,255,136,0.06); }
  .seq-tag .num { font-size: 10px; color: var(--accent); font-weight: 500; }
  .seq-tag.is-perfect .num { color: var(--perfect); }
  .seq-tag .perf-mark { font-size: 9px; opacity: 0.75; color: var(--perfect); }
  .seq-tag .rm { cursor: pointer; color: var(--muted); font-size: 15px; line-height: 1; margin-left: 2px; transition: color 0.1s; }
  .seq-tag .rm:hover { color: var(--accent); }

  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 4px; }
  .btn { font-family: var(--mono); font-size: 11px; padding: 7px 14px; border-radius: 3px; border: 1px solid var(--border-bright); background: transparent; color: var(--text); cursor: pointer; transition: all 0.12s; letter-spacing: 0.08em; }
  .btn:hover { background: var(--surface2); border-color: var(--accent2); color: var(--accent2); }
  .btn.dl { background: rgba(255,0,60,0.1); color: var(--accent); border-color: var(--accent); font-weight: 500; }
  .btn.dl:hover { background: rgba(255,0,60,0.2); }
  .btn.share { display: inline-flex; align-items: center; gap: 6px; }

  .share-url-row { display: flex; gap: 6px; margin-top: 10px; }
  .share-url-row input { flex: 1; font-family: var(--mono); font-size: 11px; padding: 7px 10px; border: 1px solid var(--border-bright); border-radius: 3px; background: var(--bg); color: var(--accent2); outline: none; min-width: 0; }

  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .toggle-label { font-size: 13px; color: var(--text); font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; }

  .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; border-radius: 2px; background: var(--border); cursor: pointer; transition: background 0.18s; border: 1px solid var(--border-bright); }
  .toggle-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 1px; background: var(--muted); transition: transform 0.18s, background 0.18s; }
  .toggle input:checked + .toggle-track { background: rgba(0,240,255,0.1); border-color: var(--accent2); }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: var(--accent2); }

  .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-row > label { font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }

  .lock-toggle { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; font-size: 10px; color: var(--muted); letter-spacing: 0.04em; transition: color 0.12s; user-select: none; }
  .lock-toggle:hover { color: var(--text); }
  .lock-toggle input[type="checkbox"] { display: none; }
  .lock-icon .icon-closed { display: none; }
  .lock-toggle input[type="checkbox"]:checked ~ .lock-icon .icon-open { display: none; }
  .lock-toggle input[type="checkbox"]:checked ~ .lock-icon .icon-closed { display: inline; }
  .lock-toggle input[type="checkbox"]:checked ~ .lock-text { color: var(--accent); }

  .field-row input[type="text"] { font-family: var(--mono); font-size: 12px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--accent2); outline: none; transition: border-color 0.12s; width: 100%; letter-spacing: 0.06em; }
  .field-row input[type="text"]:focus { border-color: var(--accent2); }
  .field-row input[type="text"]::placeholder { color: var(--muted); }
  .field-row input[type="text"].is-locked { border-color: rgba(255,160,0,0.4); }
  .field-row input[type="text"]:disabled { opacity: 0.4; cursor: not-allowed; }

  .canvas-wrap { background: #050508; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; position: relative; }
  .canvas-wrap::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent2), transparent); opacity: 0.4; z-index: 1; }
  canvas#preview { display: block; width: 100%; }

  .legend { display: flex; gap: 1rem; flex-wrap: wrap; padding-top: 2px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text); flex-shrink: 0; }
  .leg-ring { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--accent2); flex-shrink: 0; }
  .leg-line { width: 24px; height: 2px; background: var(--accent); flex-shrink: 0; position: relative; }
  .leg-line::after { content:''; position:absolute; right:-2px; top:-3px; border-left: 6px solid var(--accent); border-top: 4px solid transparent; border-bottom: 4px solid transparent; }
  .leg-x { width: 14px; height: 14px; position: relative; flex-shrink: 0; }
  .leg-x::before, .leg-x::after { content:''; position:absolute; background: var(--perfect); border-radius: 1px; width: 100%; height: 2px; top: 50%; left: 0; transform-origin: center; }
  .leg-x::before { transform: translateY(-50%) rotate(45deg); }
  .leg-x::after { transform: translateY(-50%) rotate(-45deg); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface2); color: var(--accent2); border: 1px solid var(--accent2); padding: 9px 18px; border-radius: 3px; font-size: 12px; font-family: var(--mono); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 9999; letter-spacing: 0.08em; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .scanline { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 9998; }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="page">
  <header>
    <h1>// Runner Geam</h1>
    <p><span>RunnerNotation</span> creator</p>
  </header>

  <div id="locked-banner" class="locked-banner" style="display:none">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><rect x="3" y="7" width="10" height="8" rx="1" fill="#ffa500" opacity="0.6"/><path d="M5 7V5a3 3 0 016 0v2" stroke="#ffa500" stroke-width="1.5" stroke-linecap="round"/></svg>
    LOCKED — author and tech name cannot be changed.
  </div>

  <div class="layout">
    <div>
      <div class="card">
        <div class="card-label">// Moves</div>
        <div id="move-list"></div>
        <p class="perfect-hint">// right-click slide or lunge<br>// to toggle perfect</p>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <div class="card-label">// Sequence</div>
        <div class="sequence-area" id="sequence">
          <span class="empty-hint">// click moves to add them</span>
        </div>
        <div class="btn-row" style="margin-top:12px;">
          <button class="btn" onclick="clearSeq()">CLEAR</button>
          <button class="btn dl" onclick="downloadPNG()">EXPORT PNG ↓</button>
          <button class="btn share" onclick="shareLink()">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
              <circle cx="12" cy="3" r="2" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="13" r="2" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="4" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M6 7L10 4.5M6 9L10 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            SHARE
          </button>
        </div>
        <div class="share-url-row" id="share-url-row" style="display:none">
          <input type="text" id="share-url-input" readonly onclick="this.select()">
          <button class="btn" onclick="copyShareUrl()">COPY</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">// Options</div>

        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="toggle-labels" checked onchange="draw()">
            <div class="toggle-track"></div>
          </label>
          <span class="toggle-label">SHOW_LABELS</span>
        </div>

        <div class="divider"></div>

        <div class="field-row">
          <label>
            <span>TECH_NAME</span>
            <label class="lock-toggle" id="lock-tech-wrap">
              <input type="checkbox" id="lock-tech" onchange="onLockChange('tech')">
              <span class="lock-icon">
                <svg class="icon-open" width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="3" y="7.5" width="10" height="7.5" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M5 7.5V5a3 3 0 015.97-.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <svg class="icon-closed" width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="1" stroke="#ff003c" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="#ff003c" stroke-width="1.5" stroke-linecap="round"/></svg>
              </span>
              <span class="lock-text">LOCK</span>
            </label>
          </label>
          <input type="text" id="tech-name" placeholder="// tech identifier..." oninput="draw()">
        </div>

        <div class="field-row">
          <label>
            <span>AUTHOR_ID</span>
            <label class="lock-toggle" id="lock-author-wrap">
              <input type="checkbox" id="lock-author" onchange="onLockChange('author')">
              <span class="lock-icon">
                <svg class="icon-open" width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="3" y="7.5" width="10" height="7.5" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M5 7.5V5a3 3 0 015.97-.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <svg class="icon-closed" width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="1" stroke="#ff003c" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="#ff003c" stroke-width="1.5" stroke-linecap="round"/></svg>
              </span>
              <span class="lock-text">LOCK</span>
            </label>
          </label>
          <input type="text" id="author-name" placeholder="// your handle..." oninput="draw()">
        </div>
      </div>

      <div class="card" style="padding:0; overflow:hidden;">
        <div class="canvas-wrap">
          <canvas id="preview"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-label">// Legend</div>
        <div class="legend">
          <div class="legend-item"><div class="leg-dot"></div> node</div>
          <div class="legend-item"><div class="leg-ring"></div> start</div>
          <div class="legend-item"><div class="leg-line"></div> vector</div>
          <div class="legend-item"><div class="leg-x"></div> perfect</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MOVES = ["Parry","Wallrun","Lunge","Slide","Jump","Doublejump","Platform","Groundslam"];
const PERFECT_ABLE = new Set([2, 3]);
const N = MOVES.length;
const seq = [];
let seqLocked = false;
const perfectPending = new Set();

function angle(i) { return (Math.PI * 2 * i / N) - Math.PI / 2; }

function renderMoves() {
  const el = document.getElementById('move-list');
  el.innerHTML = '';
  MOVES.forEach((m, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'move-btn-wrap';
    const b = document.createElement('button');
    b.className = 'move-btn';
    b.id = 'movebtn-' + i;
    b.innerHTML = `<span class="index">${String(i+1).padStart(2,'0')}</span>${m.toUpperCase()}`;
    b.onclick = () => {
      const perf = perfectPending.has(i);
      seq.push({ idx: i, perfect: perf });
      renderSeq(); draw();
    };
    if (PERFECT_ABLE.has(i)) {
      b.oncontextmenu = (e) => {
        e.preventDefault();
        if (perfectPending.has(i)) {
          perfectPending.delete(i);
          b.classList.remove('is-perfect');
        } else {
          perfectPending.add(i);
          b.classList.add('is-perfect');
        }
      };
    }
    if (seqLocked) b.disabled = true;
    wrap.appendChild(b);
    el.appendChild(wrap);
  });
}

function renderSeq() {
  const el = document.getElementById('sequence');
  el.innerHTML = '';
  if (!seq.length) { el.innerHTML = '<span class="empty-hint">// click moves to add them</span>'; return; }
  seq.forEach((entry, p) => {
    const t = document.createElement('div');
    t.className = 'seq-tag' + (entry.perfect ? ' is-perfect' : '');
    const perfMark = entry.perfect ? ` <span class="perf-mark">[P]</span>` : '';
    const rmPart = seqLocked ? '' : `<span class="rm" onclick="remove(${p})">×</span>`;
    t.innerHTML = `<span class="num">${p+1}</span>${MOVES[entry.idx].toUpperCase()}${perfMark}${rmPart}`;
    el.appendChild(t);
  });
}

function remove(p) { seq.splice(p, 1); renderSeq(); draw(); }

function clearSeq() {
  seq.length = 0; perfectPending.clear(); renderSeq(); draw(); renderMoves();
  document.getElementById('share-url-row').style.display = 'none';
}

function onLockChange(field) {
  const input = document.getElementById(field === 'tech' ? 'tech-name' : 'author-name');
  const cb = document.getElementById(field === 'tech' ? 'lock-tech' : 'lock-author');
  input.classList.toggle('is-locked', cb.checked);
}

function getOptions() {
  return {
    showLabels: document.getElementById('toggle-labels').checked,
    techName: document.getElementById('tech-name').value.trim(),
    authorName: document.getElementById('author-name').value.trim()
  };
}

function buildShareURL() {
  const opts = getOptions();
  const data = { s: seq.map(e => ({ i: e.idx, p: e.perfect ? 1 : 0 })), l: opts.showLabels ? 1 : 0, t: opts.techName, a: opts.authorName, lt: document.getElementById('lock-tech').checked ? 1 : 0, la: document.getElementById('lock-author').checked ? 1 : 0 };
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const base = window.location.href.split('?')[0].split('#')[0];
  return `${base}?n=${b64}`;
}

function shareLink() {
  const url = buildShareURL();
  const row = document.getElementById('share-url-row');
  document.getElementById('share-url-input').value = url;
  row.style.display = 'flex'; copyShareUrl();
}

function copyShareUrl() {
  const val = document.getElementById('share-url-input').value;
  if (navigator.clipboard) { navigator.clipboard.writeText(val).then(() => showToast('// link copied to clipboard')); }
  else { document.getElementById('share-url-input').select(); document.execCommand('copy'); showToast('// link copied to clipboard'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function loadFromURL() {
  try {
    const params = new URLSearchParams(window.location.search);
    if (!params.has('n')) return;
    const json = decodeURIComponent(escape(atob(params.get('n'))));
    const data = JSON.parse(json);
    if (Array.isArray(data.s)) {
      data.s.forEach(entry => {
        if (typeof entry === 'number') { if (entry >= 0 && entry < N) seq.push({ idx: entry, perfect: false }); }
        else if (entry && typeof entry.i === 'number' && entry.i >= 0 && entry.i < N) { seq.push({ idx: entry.i, perfect: !!entry.p }); }
      });
    }
    if (data.l === 0) document.getElementById('toggle-labels').checked = false;
    if (data.t) document.getElementById('tech-name').value = data.t;
    if (data.a) document.getElementById('author-name').value = data.a;
    const techLocked = data.lt === 1, authorLocked = data.la === 1;
    if (techLocked) { document.getElementById('tech-name').disabled = true; document.getElementById('lock-tech-wrap').style.display = 'none'; }
    if (authorLocked) { document.getElementById('author-name').disabled = true; document.getElementById('lock-author-wrap').style.display = 'none'; }
    if (techLocked && authorLocked) { document.getElementById('locked-banner').style.display = 'flex'; }
  } catch(e) { console.warn('Could not parse notation from URL', e); }
}

function drawPerfectX(ctx, x, y, r, baseSize) {
  const lineLen = r * 0.9, lw = 0.005 * baseSize;
  ctx.save();
  ctx.strokeStyle = '#00ff88'; ctx.lineWidth = lw; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - lineLen, y - lineLen); ctx.lineTo(x + lineLen, y + lineLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + lineLen, y - lineLen); ctx.lineTo(x - lineLen, y + lineLen); ctx.stroke();
  ctx.restore();
}

function renderToCanvas(ctx, baseSize, opts) {
  const { showLabels, techName, authorName } = opts;
  const hasFooter = !!(techName || authorName);
  const footerH = hasFooter ? Math.round(baseSize * 0.112) : 0;
  const totalH = baseSize + footerH;

  ctx.clearRect(0, 0, baseSize, totalH);
  ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, baseSize, totalH);

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,240,255,0.04)'; ctx.lineWidth = 1;
  const gridSize = baseSize / 10;
  for (let gx = 0; gx <= baseSize; gx += gridSize) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, baseSize); ctx.stroke(); }
  for (let gy = 0; gy <= baseSize; gy += gridSize) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(baseSize, gy); ctx.stroke(); }

  const CX = baseSize / 2, CY = baseSize / 2;
  const R = (showLabels ? 0.336 : 0.38) * baseSize;
  const DOT_R = 0.018 * baseSize;
  const LABEL_OFF = 0.06 * baseSize;

  const seqIdxs = seq.map(e => e.idx);
  const moveOccurrences = {};
  seq.forEach((e, p) => {
    if (!moveOccurrences[e.idx]) moveOccurrences[e.idx] = [];
    moveOccurrences[e.idx].push({ pos: p + 1, perfect: e.perfect });
  });

  // Draw circular orbit ring
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,240,255,0.08)'; ctx.lineWidth = 1; ctx.stroke();

  if (seqIdxs.length >= 2) {
    for (let i = 0; i < seqIdxs.length - 1; i++) {
      const a1 = angle(seqIdxs[i]), a2 = angle(seqIdxs[i+1]);
      const x1 = CX + R * Math.cos(a1), y1 = CY + R * Math.sin(a1);
      const x2 = CX + R * Math.cos(a2), y2 = CY + R * Math.sin(a2);
      const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
      const nx = dx/len, ny = dy/len, gap = DOT_R + 0.008 * baseSize;
      const sx = x1+nx*gap, sy = y1+ny*gap, ex = x2-nx*gap, ey = y2-ny*gap;

      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
      ctx.strokeStyle = '#ff003c'; ctx.lineWidth = 0.005 * baseSize; ctx.lineCap = 'round'; ctx.stroke();

      const al = 0.02 * baseSize, aw = 0.01 * baseSize;
      const ax = ex-nx*al, ay = ey-ny*al, px = -ny, py = nx;
      ctx.beginPath(); ctx.moveTo(ex, ey);
      ctx.lineTo(ax+px*aw, ay+py*aw); ctx.lineTo(ax-px*aw, ay-py*aw);
      ctx.closePath(); ctx.fillStyle = '#ff003c'; ctx.fill();
    }
  }

  MOVES.forEach((name, i) => {
    const a = angle(i);
    const x = CX + R * Math.cos(a), y = CY + R * Math.sin(a);
    const isStart = seqIdxs[0] === i;
    const occs = moveOccurrences[i] || [];
    const inSeq = occs.length > 0;
    const isPerfect = occs.some(o => o.perfect);

    if (isStart) {
      ctx.beginPath(); ctx.arc(x, y, DOT_R + 0.012 * baseSize, 0, Math.PI*2);
      ctx.strokeStyle = '#00f0ff'; ctx.lineWidth = 0.004 * baseSize; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(x, y, DOT_R, 0, Math.PI*2);
    ctx.fillStyle = inSeq ? '#d0cfe8' : '#2a2a50'; ctx.fill();

    if (occs.length) {
      const fs = (occs.length > 1 ? 0.016 : 0.02) * baseSize;
      ctx.font = `bold ${fs}px monospace`; ctx.fillStyle = '#050508';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(occs[0].pos, x, y + 0.001*baseSize);
    }

    if (isPerfect) { drawPerfectX(ctx, x, y, DOT_R * 1.6, baseSize); }

    if (showLabels) {
      const lx = CX + (R + LABEL_OFF) * Math.cos(a), ly = CY + (R + LABEL_OFF) * Math.sin(a);
      ctx.font = `${0.022 * baseSize}px 'Share Tech Mono', monospace`;
      ctx.fillStyle = inSeq ? '#d0cfe8' : '#3a3860';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(name.toUpperCase(), lx, ly);
    }
  });

  if (hasFooter) {
    const fy = baseSize;
    ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, fy, baseSize, footerH);
    ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(baseSize, fy);
    ctx.strokeStyle = '#1e1e35'; ctx.lineWidth = 1; ctx.stroke();
    const pad = 0.048 * baseSize, midY = fy + footerH / 2;
    if (techName) {
      ctx.font = `600 ${0.03 * baseSize}px 'Rajdhani', sans-serif`; ctx.fillStyle = '#ff003c';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillText(techName.toUpperCase(), pad, midY);
    }
    if (authorName) {
      ctx.font = `${0.026 * baseSize}px 'Share Tech Mono', monospace`; ctx.fillStyle = '#5a5880';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillText(authorName, baseSize - pad, midY);
    }
  }
}

function draw() {
  const opts = getOptions();
  const hasFooter = !!(opts.techName || opts.authorName);
  const canvas = document.getElementById('preview');
  const baseSize = 500;
  const footerH = hasFooter ? Math.round(baseSize * 0.112) : 0;
  canvas.width = baseSize; canvas.height = baseSize + footerH;
  canvas.style.width = '100%'; canvas.style.height = 'auto';
  renderToCanvas(canvas.getContext('2d'), baseSize, opts);
}

function downloadPNG() {
  const opts = getOptions();
  const hasFooter = !!(opts.techName || opts.authorName);
  const baseSize = 1000;
  const footerH = hasFooter ? Math.round(baseSize * 0.112) : 0;
  const off = document.createElement('canvas');
  off.width = baseSize; off.height = baseSize + footerH;
  renderToCanvas(off.getContext('2d'), baseSize, opts);
  const a = document.createElement('a');
  a.download = (opts.techName || 'runner_notation') + '.png';
  a.href = off.toDataURL('image/png'); a.click();
}

loadFromURL(); renderMoves(); renderSeq(); draw();
</script>
</body>
</html>
